name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        swift: ["5.3-focal"]

    name: "Linux (Swift ${{ matrix.swift }})"

    container:
      image: swift:${{ matrix.swift }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y libxml2-dev graphviz-dev
      - name: Build and Test
        run: swift test -c release --enable-test-discovery

  validate-assets:
    runs-on: ubuntu-latest

    name: "Validate Assets"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('.node/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install node dependencies
        run: |
          cd .node
          npm install
      - name: Test assets
        run: |
          cd .node
          OLD=`cksum ../Sources/swift-doc/Generated/CSS.swift`
          npm run build
          NEW=`cksum ../Sources/swift-doc/Generated/CSS.swift`
          if [[ "$OLD" != "$NEW" ]]; then
            echo "Regenerated assets differ from committed version"
            exit -1
          fi