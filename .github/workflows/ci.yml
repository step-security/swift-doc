name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  linux:
    permissions:
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest

    strategy:
      matrix:
        swift: ["5.3-focal"]

    name: "Linux (Swift ${{ matrix.swift }})"

    container:
      image: swift:${{ matrix.swift }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y libxml2-dev graphviz-dev
      - name: Build and Test
        run: swift test -c release --enable-test-discovery

  validate-assets:
    permissions:
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest

    name: "Validate Assets"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('.node/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install node dependencies
        run: |
          cd .node
          npm install
      - name: Test assets
        run: |
          cd .node
          OLD=`cksum ../Sources/swift-doc/Generated/CSS.swift`
          npm run build
          NEW=`cksum ../Sources/swift-doc/Generated/CSS.swift`
          if [[ "$OLD" != "$NEW" ]]; then
            echo "Regenerated assets differ from committed version"
            exit -1
          fi